# Conf.d files are included inside the "http" block by nginx.conf,
# so we can safely declare upstreams here.
upstream api_upstream {
  server api-service.ip-reputation.svc.cluster.local:8000;
}
upstream auth_upstream {
  server auth-service.ip-reputation.svc.cluster.local:8001;
}

server {
  listen 80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA
  location / {
    try_files $uri /index.html;
  }
  location /api/check-ip/ {
    proxy_pass http://auth-service/check-reputation/;
}
  # ---- Proxies ----
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header Connection        "";
    proxy_pass http://api_upstream/;   # NOTE trailing slash
  }

  location /auth/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header Connection        "";
    proxy_pass http://auth_upstream/;  # NOTE trailing slash
  }
}
