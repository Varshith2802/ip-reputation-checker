apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-config
  namespace: ip-reputation
data:
  MONGO_URI: mongodb://mongodb:27017
  MONGO_DB_NAME: ip_reputation_db
  # Back-compat for older codepaths that expect a single URI with db name
  MONGODB_URI: mongodb://mongodb:27017/ip_reputation_db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ip-reputation
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    spec:
      containers:
      - name: auth-service
        imagePullPolicy: Always
        env:
          - name: MONGO_URI
            valueFrom: { configMapKeyRef: { name: auth-config, key: MONGO_URI } }
          - name: MONGO_DB_NAME
            valueFrom: { configMapKeyRef: { name: auth-config, key: MONGO_DB_NAME } }
          - name: MONGODB_URI
            valueFrom: { configMapKeyRef: { name: auth-config, key: MONGODB_URI } }
        readinessProbe:
          httpGet: { path: /health, port: 8000 }
          initialDelaySeconds: 2
          periodSeconds: 5
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits:   { cpu: "300m", memory: "384Mi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
  namespace: ip-reputation
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    spec:
      containers:
      - name: api-service
        imagePullPolicy: Always
        readinessProbe:
          httpGet: { path: /health, port: 8000 }
          initialDelaySeconds: 2
          periodSeconds: 5
        resources:
          requests: { cpu: "100m", memory: "128Mi" }
          limits:   { cpu: "300m", memory: "384Mi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-web
  namespace: ip-reputation
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    spec:
      containers:
      - name: frontend
        imagePullPolicy: Always
        # NGINX serves a tiny /api/health that returns 200
        readinessProbe:
          httpGet: { path: /api/health, port: 80 }
          initialDelaySeconds: 2
          periodSeconds: 5
        resources:
          requests: { cpu: "25m",  memory: "32Mi" }
          limits:   { cpu: "100m", memory: "128Mi" }
